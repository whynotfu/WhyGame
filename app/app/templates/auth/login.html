{% extends 'base.html' %}
{% block title %}Login — WhyGame{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-card__header">
      <h1 class="auth-card__title">Welcome back</h1>
      <p class="auth-card__sub">Sign in to continue playing</p>
    </div>

    <form class="auth-form" method="post" action="{{ url_for('auth.login') }}">
      <div class="auth-form__group">
        <label class="auth-form__label" for="email">Email</label>
        <input class="auth-form__input" type="email" id="email" name="email"
               placeholder="you@example.com" required
               value="{{ request.form.get('email', '') }}">
      </div>

      <div class="auth-form__group">
        <label class="auth-form__label" for="password">Password</label>
        <input class="auth-form__input" type="password" id="password" name="password"
               placeholder="••••••••" required>
      </div>

      <button class="auth-form__submit" type="submit">Sign in</button>
    </form>

    <p class="auth-card__footer">
      Don't have an account?
      <a href="{{ url_for('auth.register') }}" class="auth-card__link">Register</a>
    </p>

  </div>
</div>
{% endblock %}
