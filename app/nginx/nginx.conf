server {
    listen 80;

    client_max_body_size 512M;

    # WebGL / Unity MIME types
    types {
        application/wasm                  wasm;
        application/octet-stream          data;
        application/javascript            js;
        text/css                          css;
        text/html                         html htm;
        image/png                         png;
        image/jpeg                        jpg jpeg;
        image/webp                        webp;
        image/gif                         gif;
        image/svg+xml                     svg;
        font/woff2                        woff2;
        font/woff                         woff;
    }

    location ~* ^/static/.*\.(css|js)$ {
        root /app/app;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    location /static/ {
        alias /app/app/static/;
        expires 7d;
    }

    # ── Unity WebGL Brotli-compressed files ─────────────────────────
    # Must be before /storage/games/ prefix location so regex wins.

    location ~* /storage/games/.*\.wasm\.br$ {
        root /app;
        types { }
        default_type application/wasm;
        add_header Content-Encoding br;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
        expires 1d;
    }

    location ~* /storage/games/.*\.js\.br$ {
        root /app;
        types { }
        default_type application/javascript;
        add_header Content-Encoding br;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
        expires 1d;
    }

    location ~* /storage/games/.*\.data\.br$ {
        root /app;
        types { }
        default_type application/octet-stream;
        add_header Content-Encoding br;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
        expires 1d;
    }

    # ── Unity WebGL Gzip-compressed files ───────────────────────────

    location ~* /storage/games/.*\.wasm\.gz$ {
        root /app;
        types { }
        default_type application/wasm;
        add_header Content-Encoding gzip;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
        expires 1d;
    }

    location ~* /storage/games/.*\.js\.gz$ {
        root /app;
        types { }
        default_type application/javascript;
        add_header Content-Encoding gzip;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
        expires 1d;
    }

    location ~* /storage/games/.*\.data\.gz$ {
        root /app;
        types { }
        default_type application/octet-stream;
        add_header Content-Encoding gzip;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
        expires 1d;
    }

    # ── General game storage (HTML, images, non-compressed assets) ───
    location /storage/games/ {
        alias /app/storage/games/;
        expires 1d;
        add_header Cross-Origin-Opener-Policy  "same-origin"    always;
        add_header Cross-Origin-Embedder-Policy "require-corp"  always;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
    }

    location /storage/ {
        alias /app/storage/;
        expires 7d;
        add_header Cross-Origin-Resource-Policy "cross-origin"  always;
    }

    location / {
        proxy_pass http://web:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
